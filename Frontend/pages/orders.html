<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
    <link rel="stylesheet" href="../css/products.css">
    <link rel="stylesheet" href="../css/orders.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="navbar">

    <div class="nav-left">
        <div class="logo">
            Zenvora <span>Living</span>
        </div>
    </div>

    <div class="nav-right">

        <a href="products.html" class="icon">
            <i class="fa-solid fa-house"></i>
        </a>

        <div class="profile">
            <div class="icon profile-btn">
                <i class="fa-regular fa-user"></i>
            </div>

            <div class="dropdown" id="profileMenu">
                <div class="user-name" id="userDisplay">User</div>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>

    </div>

</div>

<div id="orders"></div>

<script>
    document.addEventListener("DOMContentLoaded", function () {

const profileBtn = document.querySelector(".profile-btn");
const profileMenu = document.getElementById("profileMenu");
const logoutBtn = document.getElementById("logoutBtn");

let user = localStorage.getItem("user");
if (user) {
    document.getElementById("userDisplay").innerText = "Hi, " + user;
}

profileBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    profileMenu.classList.toggle("show");
});

logoutBtn.addEventListener("click", function (e) {
    e.preventDefault();
    localStorage.removeItem("user");
    window.location.href = "login.html";
});

document.addEventListener("click", function () {
    profileMenu.classList.remove("show");
});

});
</script>

<script>
let username = localStorage.getItem("user");

if (!username) {
    alert("Login required");
    window.location.href = "login.html";
}

fetch(`http://localhost:8081/order/${username}`)
.then(res => {
    if (!res.ok) {
        throw new Error("API not found");
    }
    return res.json();
})
.then(data => {

let container = document.getElementById("orders");
container.innerHTML = "";


if (!data || data.length === 0) {
    container.innerHTML = `
        <div class="empty-orders">
            <i class="fa-solid fa-box-open"></i>
            <h3>No Orders Placed</h3>
            <p>Your orders will appear here once you place them.</p>
        </div>
    `;
    return;
}

data.forEach(order => {
    container.innerHTML += `
    <div class="order-card">
        <h3>${order.product_name}</h3>
        <p>Qty: ${order.quantity}</p>
        <p>Total: ₹${order.total}</p>
        <p>${order.order_date}</p>
    </div>
    `;
});
});
</script>

</body>
</html>
