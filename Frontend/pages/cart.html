<!DOCTYPE html>
<html>
<head>
    <title>Cart Page</title>

    <link rel="stylesheet" href="../css/cart.css">
    <link rel="stylesheet" href="../css/products.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="navbar">

    <div class="nav-left">
        <div class="logo">
            Zenvora <span>Living</span>
        </div>
    </div>

    <div class="nav-right">

        <a href="products.html" class="icon">
            <i class="fa-solid fa-house"></i>
        </a>

        <a href="wishlist.html" class="icon wishlist-btn">
            <i class="fa-regular fa-heart"></i>
        </a>

        <div class="profile">
            <div class="icon profile-btn">
                <i class="fa-regular fa-user"></i>
            </div>

            <div class="dropdown" id="profileMenu">
                <div class="user-name" id="userDisplay">User</div>
                <a href="orders.html">My Orders</a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>

    </div>

</div>

<div class="cart-box">

    <h2 class="cart-title">Cart (<span id="cartCountText">0</span>)</h2>
    
        <div class="cart-left"></div>
    
        <div class="cart-summary">
    
            <h3>Checkout</h3>
    
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">₹0</span>
            </div>
    
            <div class="summary-row total">
                <span>Total</span>
                <span id="total">₹0</span>
            </div>
    
            <button class="checkout-btn" id="checkoutBtn" onclick="goToCheckout()">
                Continue to Checkout
            </button>
    
        </div>
    
    </div>

</div>

<script>
    function goToCheckout() {
        window.location.href = "checkout.html";
    }
    </script>

<script>
    document.addEventListener("DOMContentLoaded", function () {

const profileBtn = document.querySelector(".profile-btn");
const profileMenu = document.getElementById("profileMenu");
const logoutBtn = document.getElementById("logoutBtn");

let user = localStorage.getItem("user");
if (user) {
    document.getElementById("userDisplay").innerText = "Hi, " + user;
}

profileBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    profileMenu.classList.toggle("show");
});

logoutBtn.addEventListener("click", function (e) {
    e.preventDefault();
    localStorage.removeItem("user");
    window.location.href = "login.html";
});

document.addEventListener("click", function () {
    profileMenu.classList.remove("show");
});

});
</script>

<script>
    function loadCart() {

let username = localStorage.getItem("user");

fetch(`http://localhost:8081/cart/${username}`)
.then(res => res.json())
.then(data => {

    let container = document.querySelector(".cart-left");
    container.innerHTML = "";

    let total = 0;
    let count = 0;

    data.forEach(item => {

        total += item.price * item.quantity;
        count += item.quantity;

        container.innerHTML += `
<div class="cart-item">

    <div class="cart-img">
        <img src="../images/${item.image}">
    </div>

    <div class="cart-details">

        <h3>${item.name}</h3>

        <div class="qty-box">
            <button class="qty-btn" onclick="decreaseQty(${item.id})">
    <i class="fa-solid fa-minus"></i>
</button>

<span class="qty-number">${item.quantity}</span>

<button class="qty-btn" onclick="increaseQty(${item.id})">
    <i class="fa-solid fa-plus"></i>
</button>

<i class="fa-solid fa-trash delete"
   onclick="deleteItem(${item.id})"></i>

        </div>
    </div>

    <div class="cart-price">
        ₹${item.price * item.quantity}
    </div>

</div>
`;
    });

    document.getElementById("cartCountText").innerText = count;
    document.getElementById("subtotal").innerText = "₹" + total;
    document.getElementById("total").innerText = "₹" + total;

    let btn = document.getElementById("checkoutBtn");

    if (count === 0) {
        btn.disabled = true;
        btn.style.opacity = "0.5";
        btn.style.cursor = "not-allowed";
    } else {
        btn.disabled = false;
        btn.style.opacity = "1";
        btn.style.cursor = "pointer";
    }

});

}

loadCart();
</script>

<script>

    function increaseQty(productId) {
        let username = localStorage.getItem("user");
    
        fetch("http://localhost:8081/cart/increase", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                product_id: productId
            })
        })
        .then(res => res.text())
        .then(() => {
    loadCart();
    updateCartBadgeGlobal();
});
    }
    
    
    
    function decreaseQty(productId) {
    
        let username = localStorage.getItem("user");
    
        fetch("http://localhost:8081/cart/decrease", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                product_id: productId
            })
        })
        .then(res => res.text())
        .then(() => {
    loadCart();
    updateCartBadgeGlobal();
});;
    }
    
    
    
    function deleteItem(productId) {
    
        let username = localStorage.getItem("user");
    
        fetch("http://localhost:8081/cart/delete", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                product_id: productId
            })
        })
        .then(res => res.text())
        .then(() => {
    loadCart();
    updateCartBadgeGlobal();
});
    }
    
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
    const wishlistBtn = document.querySelector(".wishlist-btn");

    if(wishlistBtn){
        wishlistBtn.addEventListener("click", function () {
            this.classList.add("animate");

            setTimeout(() => {
                this.classList.remove("animate");
            }, 300);

            this.classList.toggle("active");
        });
    }
});
    </script>

    <script>
        function updateCartBadgeGlobal() {

let username = localStorage.getItem("user");
if (!username) return;

fetch(`http://localhost:8081/cart/count/${username}`)
.then(res => res.json())
.then(data => {

    let badge = document.getElementById("cartCount");
    if (!badge) return;

    let count = data.count || 0;

    if (count == 0) {
        badge.style.display = "none";
    } else {
        badge.style.display = "flex";
        badge.innerText = count;

        badge.classList.add("animate");
        setTimeout(() => {
            badge.classList.remove("animate");
        }, 300);
    }
});
}
    </script>
    
</body>
</html>
